<title>PokéTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9ff;
  --bg2: #f5f5f5;
  --bg3: #eeeeee;
  --card: #ffffff;
  --border: rgba(0,0,0,0.1);
  --yellow: #f5c518;
  --yellow2: #ffd84d;
  --blue: #4a90d9;
  --red: #e05252;
  --green: #4caf82;
  --text: #111111;
  --muted: #888888;
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
  position: relative;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#screen-home {
  position: relative;
  overflow: hidden;
}
.home-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.home-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  opacity: 0.65;
}
.home-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.1) 0%,
    rgba(255,255,255,0.0) 40%,
    rgba(255,255,255,0.7) 75%,
    rgba(255,255,255,0.95) 100%
  );
}



/* Dark gradient overlay - heavier at bottom so cards are readable */


.home-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 80px);
  padding: 0 0 16px;
  justify-content: flex-end;
  overflow: hidden;
}

/* Header */
.home-header {
  padding: 58px 22px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 2.5px;
  line-height: 1;
}
.logo-toth {
  color: #111111;
}
.logo-poke {
  color: #7ab8f5;
}
.logo-tracker {
  color: #111111;
}


/* Total investment hero */
.hero-block {
  margin: 20px 22px 0;
  text-align: center;
}
.hero-label {
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
}
.hero-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  letter-spacing: 2px;
  background: none; color: #111111;
  line-height: 1;
}
.hero-sub {
  font-size: 16px;
  color: var(--muted);
  font-weight: 600;
  margin-top: 4px;
}

/* Split cards - boosters vs cards */
.split-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 40px;
}
.split-card {
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: var(--radius);
  padding: 8px 12px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.split-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.split-card.boosters::before { background: linear-gradient(90deg, var(--yellow), var(--yellow2)); }
.split-card.cards::before { background: linear-gradient(90deg, var(--blue), #7ab8f5); }
.split-card.bundles::before { background: linear-gradient(90deg, #a855f7, #c084fc); }
.split-card.etbs::before { background: linear-gradient(90deg, #ef4444, #f87171); }

.split-icon { font-size: 28px; margin-bottom: 10px; }
.split-type {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  color: #444;
}
.split-card.boosters .split-type { color: #b8860b; }
.split-card.cards .split-type { color: #1a5fa8; }
.split-card.bundles .split-type { color: #7e22ce; }
.split-card.etbs .split-type { color: #b91c1c; }
.split-amount {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  color: #111;
  line-height: 1;
}
.split-count {
  font-size: 12px;
  color: #888;
  font-weight: 700;
  margin-top: 4px;
}

/* Recent section */




.recent-list { padding: 0 22px; display: flex; align-items: center; justify-content: center; flex: 1; }

.item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 13px 14px;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: slideIn 0.22s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.item-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.icon-booster { background: rgba(245,197,24,0.15); }
.icon-card    { background: rgba(74,144,217,0.15); }
.icon-bundle  { background: rgba(168,85,247,0.15); }
.icon-etb     { background: rgba(239,68,68,0.15); }
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-meta { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }
.item-price { font-size: 15px; font-weight: 900; color: var(--green); white-space: nowrap; }

/* Empty state */


/* Inline FAB for empty state */
.empty-home {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
}
.fab-inline {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--yellow), var(--yellow2));
  color: #0a0c18;
  font-size: 80px;
  font-weight: 900;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 40px rgba(245,197,24,0.5);
  transition: transform 0.15s;
  line-height: 1;
}
.fab-inline:active { transform: scale(0.91); }




/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 8px 0 28px;
  z-index: 400;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  padding: 6px 0;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--yellow); }
#nav-collection.active { color: var(--blue); }
.nav-icon { font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center; }
.nav-icon svg { opacity: 0.4; transition: opacity 0.15s; }
.nav-btn.active .nav-icon svg { opacity: 1; }

/* ══════════════════════════════
   COLLECTION SCREEN
══════════════════════════════ */
#screen-collection {
  background: var(--bg);
}
.page-header {
  padding: 58px 22px 16px;
  background: #ffffff;
  border-bottom: 1px solid rgba(0,0,0,0.1);
  position: sticky; top: 0; z-index: 100;
}
.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 12px;
}
.tabs {
  display: flex; gap: 7px;
}
.tab {
  flex: 1; padding: 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; transition: all 0.18s;
  text-align: center;
}
.tab.active { background: var(--yellow); color: #0a0c18; border-color: var(--yellow); }

.collection-list { padding: 14px 22px 110px; }

.col-item-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 15px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  animation: slideIn 0.22s ease;
}
.col-item-right { text-align: right; flex-shrink: 0; }
.col-item-price { font-size: 16px; font-weight: 900; color: var(--green); }
.col-item-qty { font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 2px; }
.delete-btn {
  background: none; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
  padding: 4px 0 4px 8px; opacity: 0.5;
  transition: opacity 0.15s;
}
.delete-btn:active { opacity: 1; color: var(--red); }
.badge {
  display: inline-block; font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 7px; border-radius: 6px;
}
.badge-booster { background: rgba(245,197,24,0.15); color: var(--yellow); }
.badge-card    { background: rgba(74,144,217,0.15); color: var(--blue); }
.badge-bundle  { background: rgba(168,85,247,0.15); color: #a855f7; }
.badge-etb     { background: rgba(239,68,68,0.15); color: #ef4444; }

.empty-state {
  text-align: center; padding: 56px 20px; color: var(--muted);
}
.empty-state .ei { font-size: 48px; margin-bottom: 12px; }
.empty-state .et { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.empty-state .es { font-size: 13px; line-height: 1.5; }

/* ══════════════════════════════
   MODAL
══════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 600;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #f8f8f8;
  border-radius: 26px 26px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  padding: 12px 22px 48px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0,0,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 38px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px; margin: 0 auto 22px;
}
.modal-title { font-size: 21px; font-weight: 900; margin-bottom: 20px; }

.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--muted); margin-bottom: 6px; display: block;
}
.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 13px 14px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 600;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--yellow); }
.modal.card-theme { background: #f0f5ff; }
.modal.card-theme .form-input:focus { border-color: var(--blue); }
.modal.card-theme .type-btn.selected { border-color: var(--blue); color: var(--blue); background: rgba(74,144,217,0.08); }
.modal.card-theme .submit-btn { background: linear-gradient(135deg, var(--blue), #7ab8f5); color: #fff; }
.modal.card-theme .form-input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }

.type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; row-gap: 9px; }
.type-btn {
  padding: 12px; border-radius: 13px;
  border: 2px solid var(--border);
  background: var(--bg3); color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all 0.18s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.type-btn.selected { border-color: var(--yellow); color: var(--yellow); background: rgba(245,197,24,0.08); }

.submit-btn {
  width: 100%; padding: 15px;
  border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--yellow), var(--yellow2));
  color: #0a0c18;
  font-family: 'Nunito', sans-serif;
  font-size: 16px; font-weight: 900;
  cursor: pointer; margin-top: 8px;
  transition: transform 0.15s, opacity 0.15s;
}
.submit-btn:active { transform: scale(0.97); opacity: 0.85; }

.input-error { border-color: var(--red) !important; }
</style>
</head>

  </button>
</nav>

<!-- Image zoom overlay -->
<div id="image-zoom-overlay" onclick="closeImageZoom()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:900; align-items:center; justify-content:center; flex-direction:column; gap:16px;">

<!-- Remove items modal -->
<div class="modal-overlay" id="remove-modal" onclick="handleRemoveOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="remove-modal-title">Ubrať kusy</div>
    <div style="text-align:center; margin-bottom:16px;">
      <div style="font-size:13px; color:#888; font-weight:600; margin-bottom:4px;">Aktuálne v kolekcii</div>
      <div id="remove-current-info" style="font-size:15px; font-weight:800; color:#111;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Koľko kusov ubrať?</label>
      <div style="display:flex; align-items:center; gap:12px;">
        <button onclick="changeRemoveQty(-1)" style="width:44px;height:44px;border-radius:50%;border:none;background:var(--yellow);font-size:22px;font-weight:900;cursor:pointer;">−</button>
        <input class="form-input" id="remove-qty" type="number" value="1" min="1" style="text-align:center;font-size:20px;font-weight:800;" oninput="updateRemovePreview()">
        <button onclick="changeRemoveQty(1)" style="width:44px;height:44px;border-radius:50%;border:none;background:var(--yellow);font-size:22px;font-weight:900;cursor:pointer;">+</button>

    </div>

    <button onclick="closeRemoveModal()" style="width:100%;margin-top:10px;padding:12px;border:none;background:none;font-size:15px;font-weight:700;color:#888;cursor:pointer;">Zrušiť</button>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Pridať do kolekcie</div>

    <div class="form-group">
      <label class="form-label">Typ</label>
      <div class="type-toggle">
        <button class="type-btn selected" onclick="selectType('booster', this)">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="margin-bottom:4px;"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><path d="M2 12h20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3.5" fill="currentColor"/></svg>
          Booster pack
        </button>
        <button class="type-btn" onclick="selectType('bundle', this)">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="margin-bottom:4px;"><rect x="2" y="7" width="20" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="1.8"/><path d="M12 12v4M10 14h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Booster Bundle
        </button>
        <button class="type-btn" onclick="selectType('etb', this)">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="margin-bottom:4px;"><rect x="2" y="3" width="20" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 3v18M2 9h6M2 15h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M14 8h4M14 12h4M14 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Elite Trainer Box
        </button>
        <button class="type-btn" onclick="selectType('card', this)">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22" style="margin-bottom:4px;"><rect x="2" y="5" width="9" height="13" rx="1.5" stroke="currentColor" stroke-width="1.8" transform="rotate(-8 6.5 11.5)"/><rect x="7.5" y="4.5" width="9" height="13" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="5" width="9" height="13" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.8" transform="rotate(8 17.5 11.5)"/></svg>
          Karta
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Názov sady / karty</label>
      <div style="position:relative;">
        <input class="form-input" id="input-name" type="text" placeholder="napr. Scarlet &amp; Violet 151" autocomplete="off" oninput="onNameInput(this.value)" onblur="hideDropdown()">
        <div id="autocomplete-list" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius:12px; max-height:200px; overflow-y:auto; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,0.12); margin-top:4px;"></div>
      </div>
    </div>

    <div class="form-group" id="card-set-filter" style="display:none;">
      <label class="form-label">Set (voliteľné, napr. "151")</label>
      <input class="form-input" id="input-card-set" type="text" placeholder="napr. 151, Base Set..." autocomplete="off" oninput="onNameInput(document.getElementById('input-name').value)">
    </div>

    <div class="form-group">
      <label class="form-label">Počet kusov</label>
      <input class="form-input" id="input-qty" type="number" value="1" min="1">
    </div>

    <div class="form-group">
      <label class="form-label">Cena za 1 kus (€)</label>
      <input class="form-input" id="input-price" type="number" step="0.01" min="0" placeholder="napr. 4,99">
    </div>

    <button class="submit-btn" onclick="addItem()">Uložiť do kolekcie</button>
  </div>
</div>

<script>
// ── DATA ──
let items = JSON.parse(localStorage.getItem('poke_items') || '[]');
let currentType = 'booster';
let currentTab = 'all';
let currentScreen = 'home';

// ── AUTOCOMPLETE ──
let allSets = [];
let autocompleteTimeout = null;

async function loadSets() {
  if (allSets.length > 0) return;
  try {
    const res = await fetch('https://api.pokemontcg.io/v2/sets?orderBy=-releaseDate&pageSize=250');
    const data = await res.json();
    allSets = data.data.map(s => ({ id: s.id, name: s.name, logo: s.images?.logo || '' }));
  } catch(e) { allSets = []; }
}

function onNameInput(val) {
  clearTimeout(autocompleteTimeout);
  if (!val || val.length < 2) { hideDropdown(); return; }
  autocompleteTimeout = setTimeout(async () => {
    if (currentType === 'booster') {
      await loadSets();
      const q = val.toLowerCase();
      const matches = allSets.filter(s => s.name.toLowerCase().includes(q)).slice(0, 8);
      showDropdown(matches.map(s => ({ id: s.id, name: s.name, image: s.logo, type: 'set' })));
    } else {
      // Hľadáme karty
      try {
        const setFilter = document.getElementById('input-card-set')?.value.trim();
        let query = `name:${encodeURIComponent(val+'*')}`;
        if (setFilter && setFilter.length > 0) {
          query += ` set.name:${encodeURIComponent('*'+setFilter+'*')}`;
        }
        const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${query}&pageSize=20&select=id,name,images,set,number`);
        const data = await res.json();
        const cards = (data.data || []).map(c => ({
          name: c.name,
          image: c.images?.small || '',
          type: 'card',
          set: c.set?.name || '',
          setId: c.set?.id || '',
          number: c.number || '',
          cardId: c.id || ''
        }));
        showDropdown(cards);
      } catch(e) { hideDropdown(); }
    }
  }, 300);
}

function showDropdown(matches) {
  const list = document.getElementById('autocomplete-list');
  if (!matches.length) { hideDropdown(); return; }
  list.innerHTML = matches.map(s => {
    const safeName = s.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeImg = (s.image||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeId = (s.id || s.cardId || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeSetId = (s.setId || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const isCard = s.type === 'card';
    const subtitle = isCard && s.set ? `<span style="font-size:11px;color:#888;font-weight:600;">${s.set}${s.number ? ' · #'+s.number : ''}</span>` : '';
    return `
    <div onmousedown="selectSet('${safeName}','${safeImg}','${safeId}','${safeSetId}')"
         style="padding:10px 14px; cursor:pointer; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(0,0,0,0.06);"
         onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">
      ${s.image ? `<img src="${s.image}" style="height:${isCard?'44px':'28px'}; width:${isCard?'31px':'64px'}; object-fit:contain; flex-shrink:0; border-radius:${isCard?'3px':'0'};">` : ''}
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:13px; font-weight:700; color:#111;">${s.name}</span>
        ${subtitle}
      </div>
    </div>`;
  }).join('');
  list.style.display = 'block';
}

function hideDropdown() {
  setTimeout(() => {
    const list = document.getElementById('autocomplete-list');
    if (list) list.style.display = 'none';
  }, 150);
}

function selectSet(name, image, id, setId) {
  const inp = document.getElementById('input-name');
  inp.value = name;
  inp.dataset.logo = image || '';
  inp.dataset.itemId = id || '';      // card id alebo set id
  inp.dataset.setId = setId || '';    // set id pre kartu
  hideDropdown();
}

function save() { localStorage.setItem('poke_items', JSON.stringify(items)); }

// ── FORMAT ──
function fmt(n) { return n.toFixed(2).replace('.', ',') + '€'; }

// ── DATE ──


// ── SCREENS ──
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  currentScreen = name;
  if (name === 'home') renderHome();
  if (name === 'collection') renderCollection();
  if (name === 'stats') renderStats();
  window.scrollTo(0, 0);
}

// ── HOME ──
function renderHome() {
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const boosters = items.filter(i => i.type === 'booster');
  const bundles = items.filter(i => i.type === 'bundle');
  const etbs = items.filter(i => i.type === 'etb');
  const cards = items.filter(i => i.type === 'card');
  const bVal = boosters.reduce((s, i) => s + i.price * i.qty, 0);
  const bnVal = bundles.reduce((s, i) => s + i.price * i.qty, 0);
  const eVal = etbs.reduce((s, i) => s + i.price * i.qty, 0);
  const cVal = cards.reduce((s, i) => s + i.price * i.qty, 0);
  const bQty = boosters.reduce((s, i) => s + i.qty, 0);
  const bnQty = bundles.reduce((s, i) => s + i.qty, 0);
  const eQty = etbs.reduce((s, i) => s + i.qty, 0);
  const cQty = cards.reduce((s, i) => s + i.qty, 0);

  document.getElementById('hero-total').textContent = fmt(total);
  document.getElementById('hero-sub').textContent = totalQty + ' ' + (totalQty === 1 ? 'položka' : totalQty < 5 ? 'položky' : 'položiek') + ' v kolekcii';
  document.getElementById('split-booster-val').textContent = fmt(bVal);
  document.getElementById('split-booster-cnt').textContent = bQty + ' ks';
  document.getElementById('split-bundle-val').textContent = fmt(bnVal);
  document.getElementById('split-bundle-cnt').textContent = bnQty + ' ks';
  document.getElementById('split-etb-val').textContent = fmt(eVal);
  document.getElementById('split-etb-cnt').textContent = eQty + ' ks';
  document.getElementById('split-card-val').textContent = fmt(cVal);
  document.getElementById('split-card-cnt').textContent = cQty + ' ks';

  const el = document.getElementById('recent-list');
  el.innerHTML = `<div class="empty-home"><button class="fab-inline" onclick="openModal()">+</button></div>`;
}

// ── COLLECTION ──
function renderCollection() {
  const filtered = currentTab === 'all' ? items : items.filter(i => i.type === currentTab);
  const el = document.getElementById('collection-list');
  if (filtered.length === 0) {
    const emptyImgs = { booster: 'empty-booster.png', bundle: 'empty-bundle.png', etb: 'empty-etb.png', card: 'empty-card.png' };
    const allImgs = `<img src="empty-booster.png" style="width:60px;height:60px;object-fit:contain;mix-blend-mode:multiply;"><img src="empty-bundle.png" style="width:60px;height:60px;object-fit:contain;mix-blend-mode:multiply;"><img src="empty-etb.png" style="width:60px;height:60px;object-fit:contain;mix-blend-mode:multiply;"><img src="empty-card.png" style="width:60px;height:60px;object-fit:contain;mix-blend-mode:multiply;">`;
    const emptyContent = currentTab === 'all'
      ? `<div style="display:flex;gap:8px;justify-content:center;align-items:flex-end;">${allImgs}</div>`
      : `<img src="${emptyImgs[currentTab]}" style="width:80px;height:80px;object-fit:contain;mix-blend-mode:multiply;">`;
    el.innerHTML = `<div class="empty-state"><div class="ei">${emptyContent}</div><div class="et">Nič tu nie je</div><div class="es">Pridaj položky cez tlačidlo +</div></div>`;
    return;
  }
  // Grupovanie podľa názvu
  const groups = {};
  filtered.forEach(i => {
    const key = i.name + '|' + i.type;
    if (!groups[key]) groups[key] = { name: i.name, type: i.type, logo: i.logo || '', qty: 0, totalPrice: 0, ids: [] };
    groups[key].qty += i.qty;
    groups[key].totalPrice += i.price * i.qty;
    groups[key].ids.push(i.id);
    if (!groups[key].logo && i.logo) groups[key].logo = i.logo;
  });
  const sorted = Object.values(groups).sort((a,b) => a.name.localeCompare(b.name));
  el.innerHTML = sorted.map(g => `
    <div class="col-item-card" onclick="openRemoveModal('${g.name.replace(/'/g,"\\'")}', '${g.type}')" style="cursor:pointer;">
      <div class="item-icon icon-${g.type}" onclick="${g.logo ? `event.stopPropagation(); openImageZoom('${g.logo.replace(/'/g,"\\'")}', '${g.name.replace(/'/g,"\\'")}')` : ''}">
        ${g.logo ? `<img src="${g.logo}" style="height:${g.type==='card'?'48px':'28px'}; width:${g.type==='card'?'34px':'64px'}; object-fit:contain; border-radius:${g.type==='card'?'3px':'0'}; cursor:zoom-in;">` : (g.type === 'card' ? '🃏' : g.type === 'bundle' ? '🎁' : g.type === 'etb' ? '🏆' : '📦')}
      </div>
      <div class="item-info">
        <div class="item-name">${g.name}</div>
        <div class="item-meta"><span class="badge badge-${g.type}">${g.type === 'booster' ? 'Booster' : g.type === 'bundle' ? 'Bundle' : g.type === 'etb' ? 'ETB' : 'Karta'}</span> &nbsp;${g.qty} ks · ø ${fmt(g.totalPrice/g.qty)}/ks</div>
      </div>
      <div class="col-item-right">
        <div class="col-item-price">${fmt(g.totalPrice)}</div>
        <div class="col-item-qty">${g.qty} ks</div>
      </div>
      <button class="delete-btn" onclick="event.stopPropagation(); deleteGroup(${JSON.stringify(g.ids)})">×</button>
    </div>
  `).join('');
}

function openImageZoom(src, name) {
  const overlay = document.getElementById('image-zoom-overlay');
  document.getElementById('image-zoom-img').src = src;
  document.getElementById('image-zoom-name').textContent = name;
  overlay.style.display = 'flex';
}

function closeImageZoom() {
  document.getElementById('image-zoom-overlay').style.display = 'none';
}

function deleteGroup(ids) {
  if (!confirm('Odstrániť všetky záznamy tejto sady?')) return;
  items = items.filter(i => !ids.includes(i.id));
  save(); renderHome(); renderCollection();
}

// ── REMOVE MODAL ──
let removeGroupData = null;

function openRemoveModal(name, type) {
  const groupItems = items.filter(i => i.name === name && i.type === type);
  const totalQty = groupItems.reduce((s,i) => s + i.qty, 0);
  const totalPrice = groupItems.reduce((s,i) => s + i.price * i.qty, 0);
  const avgPrice = totalPrice / totalQty;
  removeGroupData = { name, type, totalQty, totalPrice, avgPrice, groupItems };
  document.getElementById('remove-modal-title').textContent = name;
  document.getElementById('remove-current-info').textContent = `${totalQty} ks · celkom ${fmt(totalPrice)} · ø ${fmt(avgPrice)}/ks`;
  document.getElementById('remove-qty').value = 1;
  document.getElementById('remove-qty').max = totalQty;
  updateRemovePreview();
  document.getElementById('remove-modal').classList.add('open');
}

function changeRemoveQty(delta) {
  const input = document.getElementById('remove-qty');
  const val = Math.min(Math.max(1, parseInt(input.value) + delta), removeGroupData.totalQty);
  input.value = val;
  updateRemovePreview();
}

function updateRemovePreview() {
  if (!removeGroupData) return;
  const qty = parseInt(document.getElementById('remove-qty').value) || 1;
  const remaining = removeGroupData.totalQty - qty;
  const removedVal = qty * removeGroupData.avgPrice;
  const remainingVal = removeGroupData.totalPrice - removedVal;
  document.getElementById('remove-preview').innerHTML =
    remaining > 0
      ? `Zostane: <strong>${remaining} ks · ${fmt(remainingVal)}</strong>`
      : `<span style="color:var(--red)">Vymaže sa celá sada!</span>`;
}

function confirmRemove() {
  const qty = parseInt(document.getElementById('remove-qty').value) || 1;
  const { name, type, groupItems, totalQty, avgPrice } = removeGroupData;

  if (qty >= totalQty) {
    items = items.filter(i => !(i.name === name && i.type === type));
  } else {
    // Vymazeme vsetky polozky tejto skupiny a pridame novu s korektnou hodnotou
    items = items.filter(i => !(i.name === name && i.type === type));
    const remainingQty = totalQty - qty;
    const remainingTotal = remainingQty * avgPrice;
    const logo = groupItems.find(i => i.logo)?.logo || '';
    items.push({
      id: Date.now(),
      type,
      name,
      qty: remainingQty,
      price: avgPrice,
      date: new Date().toISOString(),
      logo
    });
  }
  save(); closeRemoveModal(); renderHome(); renderCollection();
}

function closeRemoveModal() {
  document.getElementById('remove-modal').classList.remove('open');
  removeGroupData = null;
}

function handleRemoveOverlayClick(e) {
  if (e.target === document.getElementById('remove-modal')) closeRemoveModal();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCollection();
}

// ── MODAL ──
function openModal() { document.getElementById('modal').classList.add('open'); setTimeout(() => document.getElementById('input-name').focus(), 380); loadSets(); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('input-name').value = '';
  document.getElementById('input-qty').value = '1';
  document.getElementById('input-price').value = '';
  document.getElementById('input-card-set').value = '';
  document.getElementById('card-set-filter').style.display = 'none';
  document.getElementById('input-name').classList.remove('input-error');
  document.getElementById('input-name').placeholder = 'napr. Scarlet & Violet 151';
  document.querySelector('#modal .modal').classList.remove('card-theme');
  currentType = 'booster';
  document.querySelectorAll('.type-btn').forEach((b,i) => { b.classList.toggle('selected', i===0); });
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function selectType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const modal = document.querySelector('#modal .modal');
  const cardSetFilter = document.getElementById('card-set-filter');
  if (type === 'card') {
    modal.classList.add('card-theme');
    cardSetFilter.style.display = 'block';
    document.getElementById('input-name').placeholder = 'napr. Charizard';
  } else {
    modal.classList.remove('card-theme');
    cardSetFilter.style.display = 'none';
    document.getElementById('input-name').placeholder = 'napr. Scarlet & Violet 151';
  }
  hideDropdown();
}

function addItem() {
  const name = document.getElementById('input-name').value.trim();
  const qty = parseInt(document.getElementById('input-qty').value) || 1;
  const price = parseFloat(document.getElementById('input-price').value) || 0;
  if (!name) {
    document.getElementById('input-name').classList.add('input-error');
    document.getElementById('input-name').focus();
    setTimeout(() => document.getElementById('input-name').classList.remove('input-error'), 1400);
    return;
  }
  const inp = document.getElementById('input-name');
  items.push({ id: Date.now(), type: currentType, name, qty, price, date: new Date().toISOString(), logo: inp.dataset.logo || '', itemId: inp.dataset.itemId || '', setId: inp.dataset.setId || '' });
  save(); closeModal(); renderHome();
  if (currentScreen === 'collection') renderCollection();
}

// ── STATS ──
function renderStats() {
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const boosters = items.filter(i => i.type === 'booster');
  const cards = items.filter(i => i.type === 'card');
  const bVal = boosters.reduce((s, i) => s + i.price * i.qty, 0);
  const cVal = cards.reduce((s, i) => s + i.price * i.qty, 0);
  const bQty = boosters.reduce((s, i) => s + i.qty, 0);
  const cQty = cards.reduce((s, i) => s + i.qty, 0);

  const stat = (label, value) => `
    <div style="background:#f8f9ff; border-radius:14px; padding:14px;">
      <div style="font-size:11px; color:#888; font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px;">${label}</div>
      <div style="font-size:18px; font-weight:900; color:#111;">${value}</div>
    </div>`;

  document.getElementById('stats-summary').innerHTML =
    stat('Celková investícia', fmt(total)) +
    stat('Počet položiek', totalQty + ' ks') +
    stat('Boostery', fmt(bVal) + ' · ' + bQty + ' ks') +
    stat('Karty', fmt(cVal) + ' · ' + cQty + ' ks');
}


// Init
renderHome();
</script>
</body>
</html>
